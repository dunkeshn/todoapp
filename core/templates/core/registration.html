<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Регистрация</title>
</head>

<div class="pt-2 pb-3 bg-dark-subtle">
    <nav class="navbar navbar-expand-lg bg-dark-subtle">
        <div class="container-fluid ms-5">
            <a class="navbar-brand text-primary fw-bolder" href="{% url 'home' %}">ToDoApp!</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent"
                    aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Переключатель навигации">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>
</div>

<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="mt-5" style="width: 35%">
            <h1 class="fs-3 text-center mb-4">
                Регистрация в <span class="text-primary fw-bolder">ToDoApp!</span>
            </h1>
            <form method="POST">
                {% csrf_token %}
                <label class="fs-5 mb-2">Имя</label>
                <input name="first_name"
                       type="text"
                       class="form-control mb-2"
                       placeholder="Иван">
                <label class="fs-5 mb-2">Фамилия</label>
                <input name="second_name"
                       type="text"
                       class="form-control mb-2"
                       placeholder="Иванов">
                <label class="fs-5 mb-2">Электронная почта</label>
                <input name="email"
                       type="text"
                       class="form-control mb-2"
                       placeholder="name@example.com">
                <label class="fs-5 mb-2">Никнейм</label>
                <input name="nick"
                       type="text"
                       class="form-control mb-2"
                       placeholder="name123">
                <label class="fs-5 mb-2">Дата рождения</label>
                <input name="date_of_birth"
                       type="date"
                       class="form-control mb-2"
                       placeholder="xx-xx-xxxx">
                <label class="fs-5 mb-2">Пароль</label>
                <input name="password"
                       type="password"
                       class="form-control mb-2"
                       placeholder="Пароль из 8 символов">
                <label class="fs-5 mb-2">Подтвердите пароль</label>
                <input name="submit_password"
                       type="password"
                       class="form-control mb-4"
                       placeholder="Пароль из 8 символов">
                <button type="submit"
                        class="btn btn-primary mb-5">
                    Зарегистрироваться
                </button>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
